name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid burning minutes on superseded runs: when a new commit lands
# on a PR or branch, cancel any in-flight run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Parity with contributor flow: every Git/shell interaction in
      # this workspace goes through scripts/*.sh. CI uses the same
      # scripts so drift between contributor and CI behavior is
      # impossible.
      - name: Validate shell scripts (POSIX parse-check)
        run: ./scripts/test-scripts.sh

      - name: Workspace setup
        run: ./scripts/setup.sh

      - name: Lint (fmt-check + check + clippy -D warnings)
        run: ./scripts/rust-lint.sh

      - name: Test (workspace, skip #[ignore])
        run: ./scripts/rust-test.sh
