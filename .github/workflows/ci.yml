name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid burning minutes on superseded runs: when a new commit lands
# on a PR or branch, cancel any in-flight run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Parity with contributor flow: every Git/shell interaction in
      # this workspace goes through scripts/*.sh. CI uses the same
      # scripts so drift between contributor and CI behavior is
      # impossible.
      - name: Validate shell scripts (POSIX parse-check)
        run: ./scripts/test-scripts.sh

      - name: Workspace setup
        run: ./scripts/setup.sh

      # Single driver for the full pre-landing flow. CI has a clean
      # checkout (no dirty submodules) so pre-landing.sh skips the
      # per-crate --ignored phase — contributor behavior matches
      # exactly, ensuring no CI/local drift.
      - name: Pre-landing checks (lint + workspace test)
        run: ./scripts/pre-landing.sh
