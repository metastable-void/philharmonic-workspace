philharmonic-connector-impl-api = { path = "philharmonic-connector-impl-api" }
inline-blob = { path = "inline-blob" }
philharmonic-connector-impl-dns = { path = "philharmonic-connector-impl-dns" }
mechanics-http-client = { path = "mechanics-http-client" }
