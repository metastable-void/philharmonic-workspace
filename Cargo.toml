[profile.dev]
# Disable incremental compilation in debug builds. Incremental
# state in `target-main/debug/incremental/` accretes per-crate
# graph fragments + many small per-query files; on this
# workspace (~33 crates, heavy deps via tract/sqlx/axum/boa) it
# materially worsens /tmp tmpfs pressure when `target-main` is
# the RAM-backed symlink (see `scripts/lib/cargo-target-dir.sh`)
# and slows down `target-main/debug` cleanups. The cost of
# disabling is full re-compile on every dep-graph change; on
# CI/pre-landing that's already the norm, and on local dev the
# cargo build cache + sccache (if configured) cover the common
# unchanged-rebuild path.
incremental = false

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1

# Abort on panic instead of unwinding. Smaller binary, faster, and removes
# an entire class of attack surface (unwind-based exploits). Only downside:
# you lose `catch_unwind`, which most code shouldn't be using anyway.
panic = "abort"

# Keep integer-overflow checks on in release. The workspace no-panic rule
# treats unchecked arithmetic as a bug (use `checked_*` / `saturating_*` /
# `wrapping_*` to declare intent); silent wrap in release would mask
# violations. Combined with `panic = "abort"`, unchecked overflow → abort
# rather than silent data corruption.
overflow-checks = true
