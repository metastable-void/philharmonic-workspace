    "philharmonic",
    "philharmonic-policy",
    "philharmonic-workflow",
    "philharmonic-connector-common",
    "philharmonic-connector-client",
    "philharmonic-connector-router",
    "philharmonic-connector-service",
    "philharmonic-connector-impl-api",
    "philharmonic-connector-impl-http-forward",
    "philharmonic-connector-impl-llm-openai-compat",
    "philharmonic-connector-impl-llm-anthropic",
    "philharmonic-connector-impl-llm-gemini",
    "philharmonic-connector-impl-sql-postgres",
    "philharmonic-connector-impl-sql-mysql",
    "philharmonic-connector-impl-dns",
    "philharmonic-connector-impl-email-smtp",
    "philharmonic-connector-impl-embed",
    "philharmonic-connector-impl-vector-search",
    "philharmonic-api",
    "inline-blob",
    "mechanics-http-server",
    "dockerlet",
    # In-tree (non-submodule) member crates live below. Two
    # sub-categories:
    # (a) workspace dev tooling / deployment bins — never
    #     published. `xtask` and the three `bins/*` crates.
    # (b) published runtime crates that live in-tree rather
    #     than as a git submodule to skip submodule lifecycle
    #     overhead. Precedent: `mechanics-h3-quinn` (listed
    #     above among submodule members for grouping; in-tree
    #     non-submodule + published, maintained via the
    #     `vendor-upstream` xtask). Planned: `mechanics-dns`
    #     (ROADMAP §3.L / D26).
    "bins/mechanics-worker",
    "bins/philharmonic-connector",
    "bins/philharmonic-api-server",
    "xtask",
]

