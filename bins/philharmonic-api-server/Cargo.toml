[package]
name = "philharmonic-api-server"
version = "0.0.0"
edition = "2024"
rust-version = "1.88"
publish = false

[[bin]]
name = "philharmonic-api"
path = "src/main.rs"

[dependencies]
philharmonic = { path = "../../philharmonic", default-features = false, features = ["webui"] }
async-trait = "0.1"
axum = "0.8"
clap = { version = "4", features = ["derive"] }
coset = "0.4"
hex = "0.4"
http = "1"
hyper-util = { version = "0.1", features = ["full"] }
rand_core = { version = "0.6", features = ["getrandom"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["mysql", "runtime-tokio"] }
tokio = { version = "1", features = ["full"] }
tokio-rustls = { version = "0.26", optional = true }
toml = "0.8"
tower = "0.5"
zeroize = { version = "1", features = ["derive"] }

[features]
default = []
https = ["philharmonic/https", "dep:tokio-rustls"]
