# philharmonic-api configuration
#
# This is an EXAMPLE. Copy to /etc/philharmonic/api.toml and
# customise before deploying. CHANGE all credentials and key
# paths. Drop-in overrides go in /etc/philharmonic/api.toml.d/.
#
# IMPORTANT: TOML scoping rule — bare keys (key = "value")
# must appear BEFORE any [table] header. A bare key placed
# after [connector_dispatch.prod] becomes a child of that
# table and is invisible at the top level.

bind = "0.0.0.0:3000"
database_url = "mysql://philharmonic:CHANGE_ME@localhost/philharmonic"
issuer = "philharmonic"

# --- WebUI branding ---
# Display name shown in the WebUI sidebar and login screen.
# The monogram icon derives from the first character.
# webui_brand_name = "Philharmonic"

# --- API signing key (Ed25519, for ephemeral API tokens) ---
# Generate: philharmonic-api gen-signing-key -o /etc/philharmonic/keys/
signing_key_path = "/etc/philharmonic/keys/api-signing.key"
signing_key_kid = "api-2026-05"

# --- SCK (substrate confidentiality key, for endpoint-config encryption) ---
# 32 random bytes. Generate: philharmonic-api gen-sck -o /etc/philharmonic/keys/
# sck_path = "/etc/philharmonic/keys/sck.key"
# sck_key_version = 1

# --- Lowerer (connector payload encryption) ---
# If configured, the API server can lower workflow configs
# through the real COSE_Sign1 + COSE_Encrypt0 pipeline.
# Generate: philharmonic-api gen-signing-key -o /etc/philharmonic/keys/
# lowerer_signing_key_path = "/etc/philharmonic/keys/lowerer-signing.key"
# lowerer_signing_key_kid = "lowerer-2026-05"
# lowerer_issuer = "philharmonic"     # defaults to issuer above
# lowerer_token_lifetime_ms = 600000  # 10 minutes

# --- Mechanics worker (JS execution) ---
# Base URL of the mechanics worker for step execution.
# The executor appends /api/v1/mechanics automatically.
# mechanics_worker_url = "http://127.0.0.1:3001"

# --- Connector router URL (as seen from the mechanics worker) ---
# The lowerer builds endpoint configs that point here. The
# mechanics worker's JS scripts POST to this URL with pre-baked
# crypto headers. Typically the API server's own /connector path.
# connector_router_url = "http://127.0.0.1:3000/connector"

# --- Connector dispatch upstream ---
# connector_service_url = "http://127.0.0.1:3002"

# --- Connector router domain suffix ---
# connector_domain_suffix = "connector.example.com"

# --- API verifying keys (for token verification) ---
# Each entry verifies tokens signed by a known key.
[[verifying_keys]]
kid = "api-2026-05"
public_key_path = "/etc/philharmonic/keys/api-verifying.pub"
issuer = "philharmonic"
# not_before = 0        # Unix millis, default 0 (always valid)
# not_after = 9999999999999  # default far future

# --- Realm public keys (for lowerer payload encryption) ---
# Generate: philharmonic-connector gen-realm-key -r prod -o /etc/philharmonic/keys/
# [[realm_public_keys]]
# kid = "realm-prod-2026-05"
# realm_id = "prod"
# mlkem_public_key_path = "/etc/philharmonic/keys/realm-prod-mlkem.pub"
# x25519_public_key_path = "/etc/philharmonic/keys/realm-prod-x25519.pub"

# --- Connector dispatch (embedded router) ---
# Maps realm IDs to upstream connector-service URLs.
# [connector_dispatch.prod]
# upstreams = ["http://connector-prod:3002"]

# --- Rate limiting (optional overrides; sensible defaults built in) ---
# [rate_limit]
# [rate_limit.workflow]
# capacity = 200
# refill_per_second = 100

# --- TLS (requires --features https at build time) ---
# [tls]
# cert_path = "/etc/philharmonic/tls/cert.pem"
# key_path = "/etc/philharmonic/tls/key.pem"
