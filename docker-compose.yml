# Build the binaries before running docker compose:
#   ./scripts/release-build.sh
#
# WARNING: This file uses placeholder credentials for local
# development only. Before any production or internet-facing
# deployment, you MUST:
#   1. Change MYSQL_ROOT_PASSWORD (and the matching healthcheck
#      and deploy/api.toml database_url password).
#   2. Change the bearer tokens in deploy/mechanics.toml.
#   3. Generate real signing keys, SCK, and realm keypairs.
#   4. Use docker-compose.override.yml for TLS certs.
# Never deploy with the defaults below.
services:
  mysql:
    image: mysql:8
    environment:
      # CHANGE THIS before any non-local deployment.
      MYSQL_ROOT_PASSWORD: philharmonic
      MYSQL_DATABASE: philharmonic
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pphilharmonic"]
      interval: 5s
      timeout: 3s
      retries: 10

  mechanics-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: mechanics-worker
    ports:
      - "3001:3001"
    volumes:
      - ./deploy/mechanics.toml:/etc/philharmonic/mechanics.toml:ro

  connector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: philharmonic-connector
    ports:
      - "3002:3002"
    volumes:
      - ./deploy/connector.toml:/etc/philharmonic/connector.toml:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: philharmonic-api
    ports:
      - "3000:3000"
      - "443:443"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./deploy/api.toml:/etc/philharmonic/api.toml:ro

volumes:
  mysql-data:
